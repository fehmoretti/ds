<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin: 0; padding: 0; background-color: #141414; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #141414; padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color: #1f1f1f; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 40px 40px 24px;">
              <svg width="40" height="45" viewBox="0 0 120 134" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M92.8334 51.9872V39.5452H114.728V15.0461H92.8334V0H68.1755V51.9872C68.1755 54.8951 68.4185 57.7452 68.8785 60.5229C60.6785 42.7136 42.6755 30.3497 21.7819 30.3497H0V76.7496H21.7819V54.9443C36.796 54.9443 49.0121 67.1606 49.0121 82.1749C49.0121 97.1891 36.796 109.405 21.7819 109.405V134C50.4039 134 73.6065 110.797 73.6065 82.1749C73.6065 79.2669 73.3634 76.4168 72.9033 73.6391C81.1033 91.4485 99.1064 103.812 120 103.812V79.2177C104.986 79.2177 92.8334 67.0015 92.8334 51.9872Z" fill="#F32B50"/>
              </svg>
              <h1 style="color: #f5f5f5; font-size: 20px; font-weight: 600; margin: 16px 0 0;">DS Tokens Setup</h1>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding: 0 40px 32px;">
              <h2 style="color: #f5f5f5; font-size: 18px; font-weight: 600; margin: 0 0 12px;">Login via Magic Link</h2>
              <p style="color: #a1a1a1; font-size: 14px; line-height: 1.6; margin: 0 0 24px;">
                Clique no botão abaixo para acessar sua conta sem precisar de senha.
              </p>
              <table cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; background-color: #F32B50; color: #ffffff; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 32px; border-radius: 8px;">
                      Acessar Conta
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 24px 40px; border-top: 1px solid rgba(255,255,255,0.06);">
              <p style="color: #6b6b6b; font-size: 12px; line-height: 1.5; margin: 0; text-align: center;">
                Se você não solicitou este link, ignore este email.<br />
                Este link expira em 1 hora.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
